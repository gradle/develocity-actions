name: Update dist

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'releases/*'
    paths-ignore:
      - 'dist/**'

permissions:
  contents: read

jobs:
  update-dist:
    if: github.repository == 'gradle/develocity-actions'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: "zulu"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run all

      - name: Commit & push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: bot-githubaction <bot-githubaction@gradle.com>
          commit_user_name: bot-githubaction
          commit_user_email: bot-githubaction@gradle.com
          commit_message: '[bot] Update dist directory'
          file_pattern: 'dist'
